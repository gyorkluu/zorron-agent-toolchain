# ============================================================================
# Optimized Nginx Static SPA Configuration for BaoTa Panel
# ============================================================================
location / {
    try_files $uri $uri/ /index.html;
}

# Dynamic cache configurations for static assets
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}
