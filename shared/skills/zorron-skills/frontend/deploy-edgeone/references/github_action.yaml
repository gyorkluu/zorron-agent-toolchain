name: Deploy Frontend to EdgeOne Pages

on:
  push:
    branches:
      - main
    paths:
      - 'client/**' # Adjust this to match your frontend source folder path

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install
          # Or pnpm install / yarn install if applicable

      - name: Build Application
        run: npm run build

      - name: Install EdgeOne CLI
        run: npm install -g edgeone

      - name: Deploy to EdgeOne Pages
        run: |
          # Replace <PROJECT_NAME> with your actual EdgeOne Pages project name
          # Replace <OUTPUT_DIR> with your build folder, e.g., dist
          edgeone pages deploy ./dist -n <PROJECT_NAME> -t ${{ secrets.EDGEONE_API_TOKEN }}
