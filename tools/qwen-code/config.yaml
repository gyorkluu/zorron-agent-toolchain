# Qwen Code 配置文件
# 由 Zorron Agent Toolchain 管理
# 此为模板文件，请根据实际需要修改

# 基础设置
agent:
  name: "Qwen Code"
  model: "qwen-coder"
  temperature: 0.7

# MCP 服务配置
mcpServers: {}

# Skills 目录
skills_dir: "{{HOME}}/.zorron/skills"

# 规则目录
rules_dir: "{{HOME}}/.zorron/rules"

# 环境变量
env:
  ZORRON_ROOT: "{{HOME}}/zorron-agent-toolchain"
  ZORRON_HOSTNAME: "{{HOSTNAME}}"
